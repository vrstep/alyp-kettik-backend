<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alyp-Kettik | Store Turnstile</title>

    <!-- jsQR library for QR code scanning -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0a0e1a;
            color: #e0e4ef;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        /* ── Header ─────────────────────────────────────────── */
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 24px 32px;
            width: 100%;
        }

        .header svg {
            width: 36px;
            height: 36px;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header .badge {
            margin-left: auto;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            padding: 6px 14px;
            border-radius: 999px;
            background: rgba(96, 165, 250, 0.12);
            color: #60a5fa;
            border: 1px solid rgba(96, 165, 250, 0.25);
        }

        /* ── Main content ───────────────────────────────────── */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 640px;
            padding: 0 32px;
            gap: 28px;
        }

        /* ── Camera view ────────────────────────────────────── */
        .camera-wrapper {
            position: relative;
            width: 400px;
            height: 400px;
            border-radius: 24px;
            overflow: hidden;
            border: 2px solid rgba(96, 165, 250, 0.3);
            box-shadow:
                0 0 60px rgba(96, 165, 250, 0.1),
                0 0 120px rgba(96, 165, 250, 0.05);
        }

        .camera-wrapper video,
        .camera-wrapper canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #scanCanvas {
            display: none;
        }

        /* Animated scan line */
        .scan-line {
            position: absolute;
            left: 10%;
            width: 80%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #60a5fa, transparent);
            border-radius: 2px;
            animation: scanAnim 2.5s ease-in-out infinite;
            box-shadow: 0 0 12px rgba(96, 165, 250, 0.6);
        }

        @keyframes scanAnim {
            0%, 100% { top: 15%; opacity: 0.4; }
            50% { top: 85%; opacity: 1; }
        }

        /* Corner markers */
        .corner {
            position: absolute;
            width: 28px;
            height: 28px;
            border-color: #60a5fa;
            border-style: solid;
            border-width: 0;
        }
        .corner.tl { top: 16px; left: 16px; border-top-width: 3px; border-left-width: 3px; border-top-left-radius: 8px; }
        .corner.tr { top: 16px; right: 16px; border-top-width: 3px; border-right-width: 3px; border-top-right-radius: 8px; }
        .corner.bl { bottom: 16px; left: 16px; border-bottom-width: 3px; border-left-width: 3px; border-bottom-left-radius: 8px; }
        .corner.br { bottom: 16px; right: 16px; border-bottom-width: 3px; border-right-width: 3px; border-bottom-right-radius: 8px; }

        /* ── Status area ────────────────────────────────────── */
        .status {
            text-align: center;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .status-icon {
            font-size: 48px;
            line-height: 1;
        }

        .status-text {
            font-size: 20px;
            font-weight: 600;
        }

        .status-sub {
            font-size: 14px;
            color: #8b92a8;
            max-width: 300px;
        }

        /* ── Result overlay ─────────────────────────────────── */
        .result-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .result-overlay.visible {
            opacity: 1;
            pointer-events: all;
        }

        .result-overlay .backdrop {
            position: absolute;
            inset: 0;
        }

        .result-overlay.success .backdrop {
            background: rgba(16, 185, 129, 0.1);
        }

        .result-overlay.error .backdrop {
            background: rgba(239, 68, 68, 0.1);
        }

        .result-card {
            position: relative;
            background: #141824;
            border-radius: 24px;
            padding: 48px 56px;
            text-align: center;
            max-width: 420px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .result-card .icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 40px;
        }

        .result-card.success .icon {
            background: linear-gradient(135deg, #10b981, #059669);
            box-shadow: 0 8px 32px rgba(16, 185, 129, 0.3);
        }

        .result-card.error .icon {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            box-shadow: 0 8px 32px rgba(239, 68, 68, 0.3);
        }

        .result-card h2 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #f1f5f9;
        }

        .result-card p {
            font-size: 16px;
            color: #94a3b8;
            line-height: 1.5;
        }

        /* ── Footer ─────────────────────────────────────────── */
        .footer {
            padding: 20px;
            text-align: center;
            font-size: 12px;
            color: #4a5068;
        }

        /* ── Config panel ───────────────────────────────────── */
        .config-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .config-bar label {
            font-size: 13px;
            font-weight: 500;
            color: #8b92a8;
        }

        .config-bar input {
            flex: 1;
            padding: 8px 14px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: #141824;
            color: #e0e4ef;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }

        .config-bar input:focus {
            border-color: #60a5fa;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 7V5a2 2 0 0 1 2-2h2"/>
            <path d="M17 3h2a2 2 0 0 1 2 2v2"/>
            <path d="M21 17v2a2 2 0 0 1-2 2h-2"/>
            <path d="M7 21H5a2 2 0 0 1-2-2v-2"/>
            <rect x="7" y="7" width="10" height="10" rx="1"/>
        </svg>
        <h1>Alyp-Kettik Turnstile</h1>
        <span class="badge">Scanner Active</span>
    </div>

    <!-- Main -->
    <div class="main">
        <!-- API URL config -->
        <div class="config-bar">
            <label>API:</label>
            <input type="text" id="apiUrl" value="https://rio.tail8c3fdb.ts.net">
        </div>

        <!-- Camera -->
        <div class="camera-wrapper">
            <video id="video" autoplay playsinline muted></video>
            <canvas id="scanCanvas"></canvas>
            <div class="scan-line"></div>
            <div class="corner tl"></div>
            <div class="corner tr"></div>
            <div class="corner bl"></div>
            <div class="corner br"></div>
        </div>

        <!-- Status -->
        <div class="status" id="status">
            <div class="status-text">Waiting for camera...</div>
            <div class="status-sub">Allow camera access to start scanning</div>
        </div>
    </div>

    <!-- Result overlay -->
    <div class="result-overlay" id="resultOverlay">
        <div class="backdrop"></div>
        <div class="result-card" id="resultCard">
            <div class="icon" id="resultIcon"></div>
            <h2 id="resultTitle"></h2>
            <p id="resultMessage"></p>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        Alyp-Kettik Cashierless Store • Turnstile Scanner v1.0
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('scanCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const statusEl = document.getElementById('status');
        const overlay = document.getElementById('resultOverlay');
        const resultCard = document.getElementById('resultCard');
        const resultIcon = document.getElementById('resultIcon');
        const resultTitle = document.getElementById('resultTitle');
        const resultMessage = document.getElementById('resultMessage');
        const apiUrlInput = document.getElementById('apiUrl');

        let scanning = true;
        let cooldown = false;

        function getApiUrl() {
            return apiUrlInput.value.replace(/\/+$/, '');
        }

        // Start webcam
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: 640, height: 640 }
                });
                video.srcObject = stream;
                video.play();

                statusEl.innerHTML = `
                    <div class="status-text">📷 Scanning...</div>
                    <div class="status-sub">Point a phone's entry QR code at the camera</div>
                `;

                requestAnimationFrame(scanFrame);
            } catch (err) {
                statusEl.innerHTML = `
                    <div class="status-icon">⚠️</div>
                    <div class="status-text">Camera Error</div>
                    <div class="status-sub">${err.message}</div>
                `;
            }
        }

        // Scan loop
        function scanFrame() {
            if (!scanning || cooldown) {
                requestAnimationFrame(scanFrame);
                return;
            }

            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const code = jsQR(imageData.data, imageData.width, imageData.height, {
                    inversionAttempts: 'dontInvert',
                });

                if (code && code.data) {
                    handleScannedCode(code.data);
                    return; // Stop scanning until processed
                }
            }

            requestAnimationFrame(scanFrame);
        }

        // Handle scanned QR
        async function handleScannedCode(data) {
            cooldown = true;

            statusEl.innerHTML = `
                <div class="status-text">⏳ Validating...</div>
                <div class="status-sub">Checking entry code with server</div>
            `;

            try {
                const res = await fetch(`${getApiUrl()}/sessions/turnstile-enter`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ entry_token: data }),
                });

                const body = await res.json();

                if (res.ok && body.success) {
                    showResult('success', `Welcome, ${body.user_name}!`, 'Session started. Enjoy your shopping!');
                } else {
                    const detail = body.detail || 'Unknown error';
                    showResult('error', 'Entry Denied', detail);
                }
            } catch (err) {
                showResult('error', 'Connection Error', `Could not reach server: ${err.message}`);
            }

            // Resume scanning after delay
            setTimeout(() => {
                cooldown = false;
                statusEl.innerHTML = `
                    <div class="status-text">📷 Scanning...</div>
                    <div class="status-sub">Point a phone's entry QR code at the camera</div>
                `;
                requestAnimationFrame(scanFrame);
            }, 4000);
        }

        // Show result overlay
        function showResult(type, title, message) {
            overlay.className = `result-overlay visible ${type}`;
            resultCard.className = `result-card ${type}`;
            resultIcon.textContent = type === 'success' ? '✓' : '✕';
            resultTitle.textContent = title;
            resultMessage.textContent = message;

            // Auto-hide after 3.5s
            setTimeout(() => {
                overlay.className = 'result-overlay';
            }, 3500);
        }

        // Boot
        startCamera();
    </script>
</body>
</html>
